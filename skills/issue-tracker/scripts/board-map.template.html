<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Issue Board</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden;
         background: #070711; color: #d6dde6;
         font: 13px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .muted { color: #7d8896; }
  /* ---- header chrome: brand · progress · counts · state chips · controls ---- */
  #bar { display: flex; gap: .7rem; align-items: center; flex-wrap: wrap; min-height: 44px;
         padding: .3rem .85rem; border-bottom: 1px solid #18202c; background: #0a0a14;
         font-size: 12px; }
  .brand { display: inline-flex; align-items: center; gap: .4rem; font-weight: 600; color: #e6edf3; }
  .brand svg { color: #00d68f; }
  .prog { width: 9rem; height: 7px; background: #161c26; border-radius: 4px; overflow: hidden; }
  .progfill { height: 100%; width: 0; background: linear-gradient(90deg, #16a34a, #00d68f); transition: width .4s ease; }
  /* chips double as the state legend: each carries its state's palette; off = filtered out */
  #chips { display: inline-flex; gap: .3rem; flex-wrap: wrap; }
  .chip { background: #11161f; border: 1px solid var(--bd, #232c3a); border-radius: .6rem;
          color: var(--tx, #9aa6b2); padding: .1rem .55rem; font: inherit; font-size: 11px; cursor: pointer; }
  .chip:hover { filter: brightness(1.25); }
  .chip.off { opacity: .32; text-decoration: line-through; }
  .chip.on { background: rgba(59,130,246,.16); }
  .ctls { display: inline-flex; gap: .3rem; margin-left: auto; }
  button.act { background: #1b2230; color: #d6dde6; border: 1px solid #2a3343; border-radius: .3rem;
               padding: .12rem .55rem; cursor: pointer; font: inherit; font-size: 12px; }
  button.act:hover { background: #263041; }
  /* ---- stage: a transformed inner canvas holds epic boxes + SVG edges + card divs ---- */
  #stage { position: relative; flex: 1; min-height: 0; }
  #cy { position: absolute; inset: 0; overflow: hidden; cursor: grab;
        background: radial-gradient(circle at 30% 20%, #0c0c1a 0%, #070711 60%); }
  #cy.grabbing { cursor: grabbing; }
  .gcanvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
  .gedges { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; }
  .gedge { stroke: #39414f; stroke-width: 1.5; fill: none; }
  .gedge.block-wait { stroke: #d97706; stroke-width: 1.8; }   /* unmet dependency, blocker idle */
  .gedge.block-live { stroke: #00d68f; stroke-width: 1.8; }   /* unmet, but the blocker is being worked */
  .gedge.block-done { stroke: #16a34a; opacity: .4; stroke-dasharray: 5 4; }  /* satisfied */
  .gedge.spawned    { stroke: #4a5568; stroke-dasharray: 2 5; }
  .gedge.relates    { stroke: #4a5568; stroke-dasharray: 1 6; opacity: .8; }
  .elabel { fill: #3d4757; font-size: 10px; letter-spacing: .08em; }
  /* ---- node cards: doperpowers' 9-state vocabulary on the card-token palette ---- */
  .node { position: absolute; width: 168px; min-height: 74px; padding: .32rem .45rem .42rem;
          border: 1px solid var(--bd); border-radius: .55rem; background: var(--bgc);
          box-shadow: 0 0 10px var(--glow); cursor: pointer; overflow: hidden;
          --bd: #39414f; --bgc: #11161f; --tx: #cbd5e1; --glow: transparent; }
  .node:hover { filter: brightness(1.18); }
  .node-head { display: flex; align-items: baseline; justify-content: space-between; gap: .3rem; }
  .node-id { font-weight: 700; font-size: .8rem; color: var(--tx); white-space: nowrap; }
  .node-badge { font-size: 9px; text-transform: uppercase; letter-spacing: .05em; color: var(--tx);
                opacity: .82; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .node-title { color: #8b97a6; font-size: .72rem; line-height: 1.25; margin-top: .12rem;
                display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .node-meta { color: var(--tx); font-size: .68rem; margin-top: .18rem; opacity: .92;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .node-meta:empty { display: none; }
  .node-tokenbar { position: absolute; left: 0; right: 0; bottom: 0; height: 3px; background: transparent; }
  .s_done { --bd: #16a34a; --bgc: rgba(22,163,74,.07);  --tx: #86efac; --glow: rgba(22,163,74,.18); }
  .s_prog { --bd: #00d68f; --bgc: rgba(0,214,143,.08);  --tx: #6ee7b7; --glow: rgba(0,214,143,.30); }
  .s_rev  { --bd: #a855f7; --bgc: rgba(168,85,247,.09); --tx: #d8b4fe; --glow: rgba(168,85,247,.22); }
  .s_elig { --bd: #3b82f6; --bgc: rgba(59,130,246,.09); --tx: #93c5fd; --glow: rgba(59,130,246,.32); }
  .s_wait { --bd: #2d3748; --bgc: rgba(45,55,72,.25);   --tx: #64748b; --glow: transparent; }
  .s_blk  { --bd: #ef4444; --bgc: rgba(239,68,68,.09);  --tx: #fca5a5; --glow: rgba(239,68,68,.22); }
  .s_info { --bd: #d97706; --bgc: rgba(217,119,6,.09);  --tx: #fcd34d; --glow: rgba(217,119,6,.22); }
  .s_def  { --bd: #2d3748; --bgc: rgba(45,55,72,.18);   --tx: #5a6677; --glow: transparent; border-style: dashed; }
  .s_wf   { --bd: #2d3748; --bgc: rgba(45,55,72,.18);   --tx: #5a6677; --glow: transparent;
            border-style: dashed; opacity: .72; }
  /* GitHub-derived error states — not part of the machine, so they scream: a
     conflict (2+ status labels) is an alarm, an untracked (no status) needs triage */
  .s_conflict { --bd: #ec4899; --bgc: rgba(236,72,153,.12); --tx: #f9a8d4; --glow: rgba(236,72,153,.30); border-width: 2px; }
  .s_untracked { --bd: #eab308; --bgc: rgba(234,179,8,.10); --tx: #fde047; --glow: rgba(234,179,8,.18); border-style: dashed; }
  .node.s_prog { animation: nodepulse 1.9s ease-in-out infinite; }
  @keyframes nodepulse { 0%,100% { box-shadow: 0 0 8px var(--glow); } 50% { box-shadow: 0 0 20px var(--glow); } }
  .node.s_prog .node-tokenbar { background: linear-gradient(90deg, transparent, #00d68f, transparent);
                                background-size: 200% 100%; animation: tokenflow 1.4s linear infinite; }
  @keyframes tokenflow { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  .node.epic-collapsed { border-style: dashed; }
  /* ---- epic bounding boxes (behind the cards) ---- */
  .epicbox { position: absolute; border: 1px dashed #2a3343; border-radius: .8rem;
             background: rgba(42,51,67,.10); }
  .epiclabel { position: absolute; color: #556170; font-size: 10px; font-weight: 600;
               letter-spacing: .1em; text-transform: uppercase; white-space: nowrap; }
  /* ---- detail panel (drill re-skin) ---- */
  #detail { position: absolute; top: .75rem; right: .75rem; width: 22rem; max-width: 92%;
            max-height: calc(100% - 1.5rem); overflow: auto; z-index: 5;
            border: 1px solid #232c3a; border-radius: .55rem; background: #0b0f17;
            box-shadow: 0 8px 30px #00000066; }
  #detail[hidden] { display: none; }
  .dhead { display: flex; gap: .45rem; align-items: center; padding: .45rem .6rem;
           border-bottom: 1px solid #18202c; background: #0d1320; position: sticky; top: 0; }
  .did { font-weight: 700; color: #e6edf3; }
  .dbadge { font-size: 9px; text-transform: uppercase; letter-spacing: .05em; color: var(--tx, #7d8896); }
  .dspacer { flex: 1; }
  .dtitle { padding: .45rem .6rem .1rem; color: #c4cdd8; font-size: .82rem; line-height: 1.35; }
  .drows { padding: .3rem .6rem .6rem; }
  .drow { display: grid; grid-template-columns: 82px 1fr; gap: 8px; padding: 4px 0;
          border-top: 1px solid #141a24; font-size: 12px; }
  .drow span { color: #556170; } .drow b { font-weight: 500; word-break: break-word; color: #aeb9c6; }
  .drow a { color: #93c5fd; text-decoration: none; } .drow a:hover { text-decoration: underline; }
  /* ---- kanban view: state columns sharing the card palette ---- */
  #kb { position: absolute; inset: 0; overflow: auto; padding: .8rem;
        display: flex; gap: .7rem; align-items: flex-start; }
  #kb[hidden] { display: none; }
  .kbcol { flex: 0 0 232px; background: #0a0e16; border: 1px solid #18202c;
           border-top: 2px solid var(--bd, #232c3a); border-radius: .6rem;
           padding: .45rem .45rem .1rem; }
  .kbhead { display: flex; justify-content: space-between; align-items: baseline; gap: .4rem;
            padding: .1rem .3rem .4rem; font-size: 11px; text-transform: uppercase;
            letter-spacing: .08em; color: var(--tx, #7d8896); }
  .kbcount { color: #556170; font-size: 10px; letter-spacing: 0; text-transform: none; }
  #kb .node { position: static; width: 100%; min-height: 0; margin-bottom: .45rem; }
  button.act.on { background: rgba(59,130,246,.16); border-color: #3b82f6; color: #93c5fd; }
  /* ---- footer: edge legend + meta ---- */
  #foot { display: flex; gap: .9rem; align-items: center; flex-wrap: wrap; padding: .25rem .85rem;
          border-top: 1px solid #18202c; background: #0a0a14; font-size: 11px; color: #556170; }
  #edgelegend { display: inline-flex; gap: .9rem; align-items: center; flex-wrap: wrap; }
  #edgelegend[hidden] { display: none; }
  .lg { display: inline-flex; align-items: center; gap: .3rem; }
  .lg i { width: 16px; border-top: 2px solid; display: inline-block; }
  .lg .dash { border-top-style: dashed; }
</style>
</head>
<body>
<div id="bar">
  <span class="brand"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>issue-board</span>
  <div class="prog"><div id="progfill" class="progfill"></div></div>
  <span id="progtxt" class="muted">—</span>
  <span id="hcounts" class="muted"></span>
  <span id="chips"></span>
  <span class="ctls">
    <button class="act on" id="vgraph">graph</button>
    <button class="act" id="vkanban">kanban</button>
    <span id="gctls">
      <button class="act" id="zin" title="zoom in">+</button>
      <button class="act" id="zout" title="zoom out">−</button>
      <button class="act" id="fit">fit</button>
    </span>
  </span>
</div>
<div id="stage">
  <div id="cy"></div>
  <div id="kb" hidden></div>
  <aside id="detail" hidden></aside>
</div>
<div id="foot">
  <span id="edgelegend">
    <span><b>edges</b></span>
    <span class="lg"><i style="border-color:#d97706"></i>active block</span>
    <span class="lg"><i style="border-color:#00d68f"></i>blocker in flight</span>
    <span class="lg"><i class="dash" style="border-color:#16a34a"></i>satisfied</span>
    <span class="lg"><i class="dash" style="border-color:#4a5568"></i>spawned / relates</span>
    <span class="lg">dashed box = epic (click its card to collapse)</span>
  </span>
  <span id="meta" style="margin-left:auto"></span>
</div>
<script id="board-data" type="application/json">__BOARD_PAYLOAD__</script>
<script>
(function () {
  "use strict";
  var SVGNS = "http://www.w3.org/2000/svg";
  var NODE_W = 168, NODE_H = 74, PAD = 60;
  var BOARD = JSON.parse(document.getElementById("board-data").textContent);
  var host = document.getElementById("cy");
  var nodeById = {}, epicById = {};
  BOARD.nodes.forEach(function (n) { nodeById[n.id] = n; });
  BOARD.epics.forEach(function (e) { epicById[e.id] = e; });

  // `done` tickets are hidden by default (finished work is clutter); the
  // struck-through "done" chip reveals them. Any state chip toggles the same way.
  var collapsed = {}, hiddenStates = { done: true }, eligibleOnly = false;
  var tx = PAD, ty = PAD, k = 1, canvas = null;

  // state class -> the short badge shown on the card (the full label goes to detail).
  var BADGE = { s_done: "done", s_prog: "running", s_rev: "review", s_elig: "ELIGIBLE",
                s_wait: "waiting", s_blk: "blocked", s_info: "needs-info",
                s_def: "deferred", s_wf: "wontfix",
                s_conflict: "CONFLICT", s_untracked: "untracked" };
  // state name (chip vocabulary) -> palette class, for coloring the filter chips.
  var STATE_CLS = { "done": "s_done", "in-progress": "s_prog", "in-review": "s_rev",
                    "ready-for-agent": "s_elig", "blocked": "s_blk", "needs-info": "s_info",
                    "deferred": "s_def", "wontfix": "s_wf",
                    "conflict": "s_conflict", "untracked": "s_untracked" };

  function el(tag, text, cls) {
    var n = document.createElement(tag);
    if (text !== undefined && text !== null) n.textContent = String(text);
    if (cls) n.className = cls;
    return n;
  }
  function svgEl(tag, attrs) {
    var e = document.createElementNS(SVGNS, tag), key;
    for (key in attrs) if (attrs.hasOwnProperty(key)) e.setAttribute(key, attrs[key]);
    return e;
  }

  // Resolve an id to the outermost COLLAPSED epic that hides it (or itself) —
  // edges from hidden members re-route to the collapsed epic's card.
  function resolve(id) {
    var hit = BOARD.epics.filter(function (e) {
      return collapsed[e.id] && (e.id === id || e.descendants.indexOf(id) >= 0);
    });
    if (!hit.length) return id;
    var outer = hit.filter(function (e) {
      return !hit.some(function (o) { return o !== e && o.descendants.indexOf(e.id) >= 0; });
    });
    return (outer[0] || hit[0]).id;
  }
  function hiddenBy(n) { return hiddenStates[n.state] || (eligibleOnly && !n.eligible); }
  function bbox(ids) {
    var xs = ids.map(function (i) { return nodeById[i].x; });
    var ys = ids.map(function (i) { return nodeById[i].y; });
    var x = Math.min.apply(null, xs), y = Math.min.apply(null, ys);
    return { x: x, y: y, w: Math.max.apply(null, xs) + NODE_W - x, h: Math.max.apply(null, ys) + NODE_H - y };
  }

  // Left-to-right cubic bezier, card edge to card edge (blockers sit left of
  // dependents; spawned/relates may run any direction — |dx| keeps those sane).
  function edgePath(a, b) {
    var x1 = a.x + NODE_W, y1 = a.y + NODE_H / 2, x2 = b.x, y2 = b.y + NODE_H / 2;
    if (x2 < x1) { x1 = a.x; x2 = b.x + NODE_W; }          // right-to-left edge: flip anchors
    var dx = Math.max(40, Math.abs(x2 - x1) * 0.5) * (x2 >= x1 ? 1 : -1);
    return "M" + x1 + "," + y1 + " C" + (x1 + dx) + "," + y1 + " " + (x2 - dx) + "," + y2 + " " + x2 + "," + y2;
  }
  // An unmet dependency edge is amber (a stalled path) — unless its blocker is
  // actively being worked (in-progress / in-review), then it reads green so the
  // eye can trace the moving critical path (the agent-harness edge idiom).
  function edgeClass(e) {
    if (e.kind === "block-active") {
      var s = nodeById[e.from];   // the real blocker, not the epic it may collapse into
      return (s && (s.cls === "s_prog" || s.cls === "s_rev")) ? "block-live" : "block-wait";
    }
    return e.kind;   // block-done / spawned / relates map straight to CSS
  }

  function metaText(n) {
    if (epicById[n.id] && collapsed[n.id])
      return "▸ " + epicById[n.id].descendants.length + " hidden";
    if (n.cls === "s_wait") return n.label;                       // "waiting: #6, #7"
    var bits = [];
    if (n.category) bits.push(n.category);
    if (n.pr) bits.push("PR");
    return bits.join(" · ");
  }
  function nodeCard(n) {
    var isEpic = !!epicById[n.id];
    var card = el("div", null, "node " + n.cls + (collapsed[n.id] ? " epic-collapsed" : ""));
    card.style.left = n.x + "px"; card.style.top = n.y + "px";
    var head = el("div", null, "node-head");
    head.appendChild(el("div", n.id + (isEpic ? (collapsed[n.id] ? " ▸" : " ▾") : ""), "node-id"));
    head.appendChild(el("span", BADGE[n.cls] || n.state, "node-badge"));
    card.appendChild(head);
    card.appendChild(el("div", n.title, "node-title"));
    card.appendChild(el("div", metaText(n), "node-meta"));
    card.appendChild(el("div", null, "node-tokenbar"));
    card.title = n.id + " · " + n.label;
    card.addEventListener("click", function (ev) {
      ev.stopPropagation();
      if (isEpic) toggleEpic(n.id);
      showDetail(n);
    });
    return card;
  }

  function render() {
    host.textContent = "";
    canvas = el("div", null, "gcanvas");
    var vis = {};
    BOARD.nodes.forEach(function (n) { if (resolve(n.id) === n.id && !hiddenBy(n)) vis[n.id] = true; });

    BOARD.epics.forEach(function (e) {                      // boxes first (behind everything)
      if (collapsed[e.id] || resolve(e.id) !== e.id) return;
      var members = [e.id].concat(e.descendants).filter(function (id) { return vis[id]; });
      if (members.length < 2) return;
      var b = bbox(members);
      var box = el("div", null, "epicbox");
      box.style.left = (b.x - 16) + "px"; box.style.top = (b.y - 30) + "px";
      box.style.width = (b.w + 32) + "px"; box.style.height = (b.h + 44) + "px";
      canvas.appendChild(box);
      var lab = el("div", e.id + " · epic", "epiclabel");
      lab.style.left = (b.x - 6) + "px"; lab.style.top = (b.y - 26) + "px";
      canvas.appendChild(lab);
    });

    var svg = svgEl("svg", { "class": "gedges" });          // edges behind the cards
    var defs = svgEl("defs", {});
    var m = svgEl("marker", { id: "arrow", viewBox: "0 0 10 10", refX: "9", refY: "5",
                              markerWidth: "6", markerHeight: "6", orient: "auto-start-reverse" });
    m.appendChild(svgEl("path", { d: "M0,0 L10,5 L0,10 z", fill: "context-stroke" }));
    defs.appendChild(m); svg.appendChild(defs);
    var seen = {}, maxx = 0, maxy = 0;
    BOARD.nodes.forEach(function (n) {
      maxx = Math.max(maxx, n.x + NODE_W); maxy = Math.max(maxy, n.y + NODE_H);
    });
    svg.setAttribute("width", maxx + PAD); svg.setAttribute("height", maxy + PAD);
    svg.style.width = (maxx + PAD) + "px"; svg.style.height = (maxy + PAD) + "px";
    BOARD.edges.forEach(function (e) {
      // A state/eligible-filtered endpoint hides its edge — even when it would
      // otherwise re-route to a visible collapsed epic (don't resurrect it).
      if (hiddenBy(nodeById[e.from]) || hiddenBy(nodeById[e.to])) return;
      var a = resolve(e.from), b = resolve(e.to);
      if (a === b || !vis[a] || !vis[b]) return;
      var key = a + ">" + b + ":" + e.kind;
      if (seen[key]) return; seen[key] = true;
      var attrs = { d: edgePath(nodeById[a], nodeById[b]), "class": "gedge " + edgeClass(e) };
      if (e.kind !== "relates") attrs["marker-end"] = "url(#arrow)";
      svg.appendChild(svgEl("path", attrs));
      if (e.kind === "spawned" || e.kind === "relates") {
        var s = nodeById[a], t = nodeById[b];
        var lbl = svgEl("text", { x: (s.x + t.x) / 2 + NODE_W / 2, y: (s.y + t.y) / 2 + NODE_H / 2,
                                  "class": "elabel" });
        lbl.textContent = e.kind;
        svg.appendChild(lbl);
      }
    });
    canvas.appendChild(svg);

    BOARD.nodes.forEach(function (n) { if (vis[n.id]) canvas.appendChild(nodeCard(n)); });
    host.appendChild(canvas);
    applyTransform();
  }

  // ---- kanban: the same tickets and filters, pivoted into state columns ----
  // Chips keep working (a hidden state's column drops out — done is hidden by
  // default here too); epic collapse is a graph concept and is ignored.
  var KB_STATES = ["ready-for-agent", "in-progress", "in-review", "blocked",
                   "needs-info", "deferred", "conflict", "untracked", "done", "wontfix"];
  // The board is GitHub-derived, so a snapshot can carry states beyond the
  // machine's own (conflict/untracked, or anything a future label adds). Give
  // every state present a column rather than silently dropping its tickets.
  BOARD.nodes.forEach(function (n) { if (KB_STATES.indexOf(n.state) < 0) KB_STATES.push(n.state); });
  var KB_CORE = { "ready-for-agent": 1, "in-progress": 1, "in-review": 1, "done": 1 };
  function kbCard(n) {
    var card = el("div", null, "node " + n.cls);
    var head = el("div", null, "node-head");
    head.appendChild(el("div", n.id, "node-id"));
    head.appendChild(el("span", BADGE[n.cls] || n.state, "node-badge"));
    card.appendChild(head);
    card.appendChild(el("div", n.title, "node-title"));
    var bits = [];
    if (epicById[n.id]) bits.push("epic · " + epicById[n.id].descendants.length);
    if (n.cls === "s_wait") bits.push(n.label);
    if (n.category) bits.push(n.category);
    if (n.pr) bits.push("PR");
    card.appendChild(el("div", bits.join(" · "), "node-meta"));
    card.appendChild(el("div", null, "node-tokenbar"));
    card.title = n.id + " · " + n.label;
    card.addEventListener("click", function (ev) { ev.stopPropagation(); showDetail(n); });
    return card;
  }
  function renderKanban() {
    var kb = document.getElementById("kb");
    kb.textContent = "";
    KB_STATES.forEach(function (s) {
      if (hiddenStates[s]) return;
      var items = BOARD.nodes.filter(function (n) {
        return n.state === s && !(eligibleOnly && !n.eligible);
      });
      if (!items.length && !KB_CORE[s]) return;     // paused/terminal columns only when populated
      if (s === "ready-for-agent")                  // dispatchables float to the top
        items = items.slice().sort(function (a, b) { return (b.eligible ? 1 : 0) - (a.eligible ? 1 : 0); });
      var col = el("div", null, "kbcol " + (STATE_CLS[s] || ""));
      var head = el("div", null, "kbhead");
      head.appendChild(el("span", s));
      var elig = items.filter(function (n) { return n.eligible; }).length;
      head.appendChild(el("span", items.length + (s === "ready-for-agent" && elig ? " · " + elig + " eligible" : ""), "kbcount"));
      col.appendChild(head);
      items.forEach(function (n) { col.appendChild(kbCard(n)); });
      kb.appendChild(col);
    });
  }

  var view = "graph";
  function renderAll() { if (view === "graph") render(); else renderKanban(); }
  function setView(v) {
    view = v;
    host.style.display = v === "graph" ? "" : "none";
    document.getElementById("kb").hidden = v !== "kanban";
    document.getElementById("gctls").style.display = v === "graph" ? "" : "none";
    document.getElementById("edgelegend").hidden = v !== "graph";   // no edges in kanban
    document.getElementById("vgraph").classList.toggle("on", v === "graph");
    document.getElementById("vkanban").classList.toggle("on", v === "kanban");
    renderAll();
  }

  function applyTransform() {
    if (canvas) canvas.style.transform = "translate(" + tx + "px," + ty + "px) scale(" + k + ")";
  }
  function toggleEpic(id) { if (collapsed[id]) delete collapsed[id]; else collapsed[id] = true; render(); }

  function contentBounds() {
    var xs = [], ys = [];
    BOARD.nodes.forEach(function (n) {
      if (resolve(n.id) === n.id && !hiddenBy(n)) { xs.push(n.x); ys.push(n.y); }
    });
    if (!xs.length) return { x: 0, y: 0, w: NODE_W, h: NODE_H };
    var x0 = Math.min.apply(null, xs), y0 = Math.min.apply(null, ys);
    return { x: x0, y: y0, w: Math.max.apply(null, xs) + NODE_W - x0, h: Math.max.apply(null, ys) + NODE_H - y0 };
  }
  // Frame the visible graph: fit to content, centered, never past 100% (a tiny
  // board stays readable rather than blown up).
  function fitView() {
    if (view !== "graph") return;
    var r = host.getBoundingClientRect();
    if (r.width < 10 || r.height < 10) { tx = PAD; ty = PAD; k = 1; applyTransform(); return; }
    var b = contentBounds(), pad = 56;
    k = Math.min(1, (r.width - pad * 2) / b.w, (r.height - pad * 2) / b.h);
    if (!isFinite(k) || k <= 0) k = 1;
    tx = (r.width - b.w * k) / 2 - b.x * k;
    ty = (r.height - b.h * k) / 2 - b.y * k;
    applyTransform();
  }
  function zoomBy(f) {
    var cx = host.clientWidth / 2, cy2 = host.clientHeight / 2;
    var nk = Math.max(0.2, Math.min(3, k * f));
    tx = cx - (cx - tx) * (nk / k); ty = cy2 - (cy2 - ty) * (nk / k); k = nk; applyTransform();
  }

  function detailRow(label, value) {
    var r = el("div", null, "drow");
    r.appendChild(el("span", label));
    if (value && value.nodeType) { var b = el("b"); b.appendChild(value); r.appendChild(b); }
    else r.appendChild(el("b", value));
    return r;
  }
  function link(url) {                    // only linkify real http(s) URLs (meta values are free text)
    if (!/^https?:\/\//.test(String(url))) return null;
    var a = el("a", url); a.href = url; a.target = "_blank"; a.rel = "noopener";
    return a;
  }
  function showDetail(n) {
    var d = document.getElementById("detail");
    d.textContent = "";
    var head = el("div", null, "dhead");
    head.appendChild(el("span", n.id, "did"));
    var badge = el("span", BADGE[n.cls] || n.state, "dbadge " + n.cls);
    head.appendChild(badge);
    head.appendChild(el("span", null, "dspacer"));
    var x = el("button", "close", "act");
    x.onclick = function () { d.hidden = true; };
    head.appendChild(x);
    d.appendChild(head);
    d.appendChild(el("div", n.title, "dtitle"));
    var rows = el("div", null, "drows");
    function add(label, v) { if (v) rows.appendChild(detailRow(label, v)); }
    add("state", n.label);
    add("category", n.category);
    add("note", n.note);
    add("blocked by", (n.blocked_by || []).join(", "));
    add("spawned by", n.spawned_by);
    add("relates", (n.relates_to || []).join(", "));
    add("branch", n.branch);
    if (n.pr) add("PR", link(n.pr) || n.pr);
    if (n.md) add("issue", link(n.md) || n.md);
    add("created", n.created);
    add("updated", n.updated);
    d.appendChild(rows);
    d.hidden = false;
  }

  // Header: done/total progress (counts ALL tickets, filters included) + live counts.
  function updateHeader() {
    var total = BOARD.nodes.length, c = { done: 0, prog: 0, rev: 0, elig: 0, blk: 0, info: 0 };
    BOARD.nodes.forEach(function (n) {
      if (n.state === "done") c.done++;
      else if (n.state === "in-progress") c.prog++;
      else if (n.state === "in-review") c.rev++;
      else if (n.state === "blocked") c.blk++;
      else if (n.state === "needs-info") c.info++;
      if (n.eligible) c.elig++;
    });
    document.getElementById("progfill").style.width = (total ? Math.round(100 * c.done / total) : 0) + "%";
    document.getElementById("progtxt").textContent = total ? c.done + "/" + total + " done" : "empty board";
    document.getElementById("hcounts").textContent =
      c.prog + " running · " + c.rev + " review · " + c.elig + " eligible · "
      + c.blk + " blocked · " + c.info + " needs-info";
  }

  function buildChips() {
    var states = [], seenS = {}, c = document.getElementById("chips");
    BOARD.nodes.forEach(function (n) { if (!seenS[n.state]) { seenS[n.state] = true; states.push(n.state); } });
    states.forEach(function (s) {
      var b = el("button", s, "chip " + (STATE_CLS[s] || "") + (hiddenStates[s] ? " off" : ""));
      b.onclick = function () {
        if (hiddenStates[s]) { delete hiddenStates[s]; b.classList.remove("off"); }
        else { hiddenStates[s] = true; b.classList.add("off"); }
        renderAll();
      };
      c.appendChild(b);
    });
    var eb = el("button", "ELIGIBLE only", "chip");
    eb.onclick = function () { eligibleOnly = !eligibleOnly; eb.classList.toggle("on", eligibleOnly); renderAll(); };
    c.appendChild(eb);
  }

  // ---- hand-rolled pan (drag) + zoom (wheel toward the cursor) ----
  host.addEventListener("wheel", function (e) {
    e.preventDefault();
    var r = host.getBoundingClientRect(), mx = e.clientX - r.left, my = e.clientY - r.top;
    var nk = Math.min(3, Math.max(0.2, k * Math.exp(-e.deltaY * 0.0015)));
    tx = mx - (mx - tx) * (nk / k); ty = my - (my - ty) * (nk / k); k = nk; applyTransform();
  }, { passive: false });
  var drag = null;
  host.addEventListener("mousedown", function (e) {
    if (e.target.closest(".node")) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty }; host.classList.add("grabbing");
  });
  window.addEventListener("mousemove", function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x); ty = drag.ty + (e.clientY - drag.y); applyTransform();
  });
  window.addEventListener("mouseup", function () { drag = null; host.classList.remove("grabbing"); });
  host.addEventListener("click", function (e) {
    if (!e.target.closest(".node")) document.getElementById("detail").hidden = true;
  });
  document.getElementById("kb").addEventListener("click", function (e) {
    if (!e.target.closest(".node")) document.getElementById("detail").hidden = true;
  });
  document.getElementById("zin").onclick = function () { zoomBy(1.2); };
  document.getElementById("zout").onclick = function () { zoomBy(1 / 1.2); };
  document.getElementById("fit").onclick = fitView;
  document.getElementById("vgraph").onclick = function () { setView("graph"); };
  document.getElementById("vkanban").onclick = function () { setView("kanban"); };
  window.addEventListener("resize", fitView);

  document.getElementById("meta").textContent =
    BOARD.meta.count + " tickets · updated " + BOARD.meta.updated;
  buildChips(); updateHeader(); render(); fitView();
})();
</script>
</body>
</html>
